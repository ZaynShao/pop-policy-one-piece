services:
  postgres:
    image: postgres:15-alpine
    container_name: pop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pop
      POSTGRES_PASSWORD: pop_dev_password
      POSTGRES_DB: pop
    ports:
      - "5432:5432"
    volumes:
      - pop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pop -d pop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pop_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pop
      MINIO_ROOT_PASSWORD: pop_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pop_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pop_pg_data:
  pop_redis_data:
  pop_minio_data:
